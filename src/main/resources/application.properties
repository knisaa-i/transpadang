spring.application.name=transpadang_final
server.port=8080
server.servlet.context-path=/

# =============================================
# DATABASE
# =============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/transpadang_spm
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# =============================================
# JPA / HIBERNATE
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# =============================================
# JWT
# =============================================
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# =============================================
# WEBSOCKET (netty-socketio)
# =============================================
app.socketio.host=0.0.0.0
app.socketio.port=9090
app.socketio.boss-count=1
app.socketio.worker-count=100
app.socketio.ping-timeout=60000
app.socketio.ping-interval=25000

# =============================================
# SWAGGER / SPRINGDOC
# =============================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true

# =============================================
# DATASOURCE PROXY
# =============================================
decorator.datasource.enabled=false
decorator.datasource.datasource-proxy.logging=slf4j
decorator.datasource.datasource-proxy.query.enable-logging=true
decorator.datasource.datasource-proxy.query.log-level=DEBUG

# =============================================
# LOGGING
# =============================================
logging.level.transpadang.spm=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO
